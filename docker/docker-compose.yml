version: '3.8'

services:
  milvus:
    image: milvusdb/milvus:latest
    container_name: milvus_server
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./docker/data/milvus:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    networks:
      - search_network

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: etcd_server
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: '1000'
      ETCD_QUOTA_BACKEND_BYTES: '4294967296'
      ETCD_SNAPSHOT_COUNT: '50000'
    volumes:
      - ./docker/data/etcd:/etcd
    command: etcd -advertise-client-urls=http://0.0.0.0:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - search_network

  minio:
    image: minio/minio:latest
    container_name: minio_server
    ports:
      - "9000:9000"
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./docker/data/minio:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - search_network

  app:
    build: .
    container_name: search_app
    ports:
      - "8501:8501"
    depends_on:
      - milvus
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
    volumes:
      - ./data:/app/data
      - ./experiments/results:/app/experiments/results
    networks:
      - search_network

networks:
  search_network:
    driver: bridge
